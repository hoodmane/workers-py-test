[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dummy-workers-runtime-sdk"
version = "0.1.0"
description = "Dummy workers runtime SDK for CI/CD testing"
requires-python = ">=3.12"
license = "Apache-2.0"

[tool.hatch.build.targets.wheel]
packages = ["src/workers"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "B",
    "C4",
    "C90",
    "E",
    "F",
    "I",
    "PERF",
    "PGH",
    "PL",
    "UP",
    "W",
]

[tool.mypy]
python_version = "3.12"
strict = true

[[tool.mypy.overrides]]
module = "workers_runtime_sdk.*"
strict = true

[tool.semantic_release]
commit_parser = "conventional-monorepo"
version_variables = ["src/workers/__init__.py:__version__"]
version_toml = ["pyproject.toml:project.version"]
tag_format = "dummy-workers-runtime-sdk-v{version}"
build_command = "uv build"

[tool.semantic_release.commit_parser_options]
scope_prefix = "dummy-workers-runtime-sdk-"
