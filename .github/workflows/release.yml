# Based on https://python-semantic-release.readthedocs.io/en/latest/configuration/configuration-guides/monorepos.html

name: Continuous Delivery

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-sdk:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-sdk-${{ github.ref_name }}
      cancel-in-progress: false

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

    permissions:
      contents: write

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup | Force branch to workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "CI Bot"
          git_committer_email: "ci-bot@example.com"
          directory: packages/workers-runtime-sdk

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
          directory: packages/workers-runtime-sdk

      - name: Upload | Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.released == 'true'
        with:
          name: distribution-artifacts-dummy-workers-runtime-sdk
          path: packages/workers-runtime-sdk/dist
          if-no-files-found: error

  release-py:
    runs-on: ubuntu-latest
    needs: release-sdk
    if: always() && (needs.release-sdk.result == 'success' || needs.release-sdk.result == 'skipped')
    concurrency:
      group: ${{ github.workflow }}-release-py-${{ github.ref_name }}
      cancel-in-progress: false

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

    permissions:
      contents: write

    steps:
      - name: Setup | Checkout Repository (latest, after SDK release)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "CI Bot"
          git_committer_email: "ci-bot@example.com"
          directory: packages/workers-py

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
          directory: packages/workers-py

      - name: Upload | Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.released == 'true'
        with:
          name: distribution-artifacts-dummy-workers-py
          path: packages/workers-py/dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: [release-sdk, release-py]
    if: always() && (needs.release-sdk.outputs.released == 'true' || needs.release-py.outputs.released == 'true')

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup | Download Build Artifacts
        uses: actions/download-artifact@v4
        id: artifact-download
        with:
          pattern: distribution-artifacts-*
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
