# Based on https://python-semantic-release.readthedocs.io/en/latest/configuration/configuration-guides/monorepos.html

name: Continuous Delivery

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}-${{ matrix.package }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: dummy-workers-runtime-sdk
            directory: packages/workers-runtime-sdk
          - package: dummy-workers-py
            directory: packages/workers-py

    outputs:
      # Use a combined output: true if ANY package was released
      sdk-released: ${{ steps.release.outputs.released }}
      py-released: ${{ steps.release.outputs.released }}

    permissions:
      contents: write

    steps:
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup | Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Setup | Install uv (for build command)
        run: |
          pip install uv

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "CI Bot"
          git_committer_email: "ci-bot@example.com"
          directory: ${{ matrix.directory }}

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
          directory: ${{ matrix.directory }}

      - name: Upload | Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.released == 'true'
        with:
          name: distribution-artifacts-${{ matrix.package }}
          path: ${{ matrix.directory }}/dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: release
    # Run if any matrix job released something
    if: always() && (needs.release.result == 'success')

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup | Download Build Artifacts
        uses: actions/download-artifact@v4
        id: artifact-download
        with:
          pattern: distribution-artifacts-*
          path: dist
          merge-multiple: true

      - name: Check for artifacts
        id: check
        run: |
          if [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "No artifacts to deploy"
          else
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "Found artifacts:"
            ls -la dist/
          fi

      - name: Publish package distributions to PyPI
        if: steps.check.outputs.has_artifacts == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
